name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==================== BACKEND TESTS ====================
  backend-tests:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Build with Maven (including tests)
        working-directory: ./springboot-application
        run: mvn clean test
      
      - name: Generate test report
        working-directory: ./springboot-application
        run: mvn test-compile
        if: always()
      
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: backend-test-results
          path: springboot-application/target/surefire-reports/

  # ==================== FRONTEND TESTS ====================
  frontend-tests:
    name: Frontend Unit Tests (Jasmine/Karma)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'foodtrack/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./foodtrack
        run: npm ci
      
      - name: Run unit tests
        working-directory: ./foodtrack
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
      
      - name: Upload coverage reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: frontend-coverage
          path: foodtrack/coverage/

  # ==================== BACKEND BUILD ====================
  backend-build:
    name: Backend Build & Security Check
    runs-on: ubuntu-latest
    needs: backend-tests
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Build with Maven (no tests, already ran)
        working-directory: ./springboot-application
        run: mvn clean package -DskipTests
      
      - name: OWASP Dependency Check
        working-directory: ./springboot-application
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -Dformat=JSON \
            -DfailBuildOnCVSS=7
        continue-on-error: true
      
      - name: Upload OWASP report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: owasp-dependency-check
          path: springboot-application/target/dependency-check-report.json

  # ==================== FRONTEND BUILD ====================
  frontend-build:
    name: Frontend Build & Analysis
    runs-on: ubuntu-latest
    needs: frontend-tests
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'foodtrack/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./foodtrack
        run: npm ci
      
      - name: Build production bundle
        working-directory: ./foodtrack
        run: npm run build
      
      - name: Analyze bundle size
        working-directory: ./foodtrack
        run: |
          ls -lh dist/foodtrack/*.js || echo "No JS files found"
          echo "Bundle analysis complete"
      
      - name: Upload production build
        uses: actions/upload-artifact@v3
        with:
          name: frontend-dist
          path: foodtrack/dist/foodtrack/

  # ==================== DOCKER BUILD ====================
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for backend
        id: backend-meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push Backend image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot-application
          file: ./springboot-application/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:buildcache,mode=max
      
      - name: Extract metadata for frontend
        id: frontend-meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./foodtrack
          file: ./foodtrack/Dockerfile
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:buildcache,mode=max

  # ==================== STAGING DEPLOYMENT ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.foodtrack.local
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Staging Environment
        run: |
          echo "🚀 Deploying to staging..."
          # Aquí iría tu comando de despliegue a staging
          # Ejemplo: kubectl apply -f kubernetes/staging/
          # O: docker-compose -f docker-compose.staging.yml up -d
          echo "✅ Deployed to staging successfully"

  # ==================== PRODUCTION DEPLOYMENT ====================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://foodtrack.local
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Production Environment
        run: |
          echo "🚀 Deploying to production..."
          # Aquí iría tu comando de despliegue a producción
          # Ejemplo: kubectl apply -f kubernetes/production/
          # O: ssh deploy@prod-server 'cd /app && docker-compose up -d'
          echo "✅ Deployed to production successfully"
      
      - name: Notify deployment
        if: always()
        run: |
          echo "📬 Deployment notification sent"

  # ==================== QUALITY GATE ====================
  quality-gate:
    name: Quality Gate Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.backend-tests.result }}" == "failure" ] || [ "${{ needs.frontend-tests.result }}" == "failure" ]; then
            echo "❌ Quality gate FAILED - Tests did not pass"
            exit 1
          fi
          echo "✅ Quality gate PASSED - All tests successful"
