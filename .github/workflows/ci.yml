name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests and package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        working-directory: springboot-application
        run: ./mvnw --batch-mode clean test

      - name: Package
        working-directory: springboot-application
        run: ./mvnw --batch-mode package -DskipTests

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: springboot-application/target/surefire-reports/

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: foodtrack/package-lock.json

      - name: Install dependencies
        working-directory: foodtrack
        run: npm ci

      - name: Test
        working-directory: foodtrack
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Build
        working-directory: foodtrack
        run: npm run build -- --configuration=production

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: foodtrack/coverage/

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: springboot-application
          push: false
          tags: foodtrack-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: foodtrack
          push: false
          tags: foodtrack-frontend:ci
