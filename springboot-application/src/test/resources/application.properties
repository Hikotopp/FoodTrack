spring.profiles.active=test

spring.datasource.url=jdbc:h2:mem:foodtrack-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=TestJwtSecretKeyForFoodTrackThatIsLongEnough2026!
jwt.expiration=3600000

app.cors.allowed-origins=http://localhost:4200
app.bootstrap.admin-name=Test Admin
app.bootstrap.admin-email=admin@test.local
app.bootstrap.admin-password=Admin123!

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
