# ===============================
# PRODUCCIÓN
# ===============================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Pool más controlado
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# CORS (solo frontend real)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
app.seed.enabled=${APP_SEED_ENABLED:false}
app.bootstrap.admin-name=${APP_BOOTSTRAP_ADMIN_NAME}
app.bootstrap.admin-email=${APP_BOOTSTRAP_ADMIN_EMAIL}
app.bootstrap.admin-password=${APP_BOOTSTRAP_ADMIN_PASSWORD}

# Seguridad extra
server.error.include-message=never
server.error.include-stacktrace=never
management.endpoint.health.show-details=never
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
